<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>NEON LASER FPS</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050712;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #11172b 0%, #050712 70%);
    }
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    .topbar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      font-weight: 800;
      text-shadow: 0 0 10px rgba(0, 255, 255, .8);
    }
    .panel {
      padding: 10px 14px;
      border: 1px solid rgba(97, 241, 255, .45);
      background: rgba(5, 10, 25, .55);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      box-shadow: 0 0 22px rgba(0, 255, 255, .12);
    }
    .stats {
      display: grid;
      gap: 4px;
      min-width: 160px;
    }
    .bar-wrap {
      width: 180px;
      height: 12px;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 99px;
      overflow: hidden;
      background: rgba(255,255,255,.08);
      margin-top: 6px;
    }
    .bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #00fff0, #9cff00);
      box-shadow: 0 0 14px rgba(0,255,240,.9);
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 32px;
      height: 32px;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 8px cyan);
    }
    #crosshair::before, #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(120,255,255,.95);
      border-radius: 99px;
    }
    #crosshair::before {
      width: 32px;
      height: 2px;
      top: 15px;
      left: 0;
    }
    #crosshair::after {
      height: 32px;
      width: 2px;
      left: 15px;
      top: 0;
    }
    #message {
      position: absolute;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%);
      padding: 12px 18px;
      border-radius: 18px;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.9);
      font-weight: 700;
      text-align: center;
      max-width: min(680px, calc(100vw - 32px));
      pointer-events: none;
    }
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 20%, rgba(0,255,255,.14), transparent 36%),
        radial-gradient(circle at 20% 80%, rgba(255,0,255,.12), transparent 34%),
        rgba(2, 4, 12, .92);
    }
    .menu {
      width: min(560px, calc(100vw - 30px));
      border-radius: 28px;
      padding: 28px;
      background: linear-gradient(180deg, rgba(10, 18, 44, .92), rgba(6, 8, 18, .88));
      border: 1px solid rgba(120,255,255,.35);
      box-shadow: 0 0 60px rgba(0,255,255,.13), inset 0 0 30px rgba(255,255,255,.03);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(36px, 8vw, 72px);
      line-height: .9;
      letter-spacing: -2px;
      text-shadow: 0 0 18px rgba(0,255,255,.9), 0 0 34px rgba(255,0,255,.45);
    }
    .subtitle {
      color: rgba(255,255,255,.72);
      margin-bottom: 22px;
      line-height: 1.6;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 18px;
      padding: 14px 22px;
      color: #001015;
      background: linear-gradient(135deg, #4dfff6, #b8ff38);
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,255,240,.22), 0 0 20px rgba(0,255,240,.28);
    }
    .controls {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      color: rgba(255,255,255,.72);
      font-size: 14px;
    }
    .key {
      padding: 10px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background: rgba(255,255,255,.05);
    }
    .mobile-controls {
      position: fixed;
      inset: auto 0 0 0;
      z-index: 8;
      pointer-events: none;
      display: none;
      padding: 18px;
      padding-bottom: calc(18px + env(safe-area-inset-bottom));
      justify-content: space-between;
      align-items: flex-end;
    }
    .stick, .shootBtn {
      pointer-events: auto;
      touch-action: none;
      user-select: none;
    }
    .stick {
      width: 140px;
      height: 140px;
      border-radius: 999px;
      border: 1px solid rgba(120,255,255,.25);
      background: rgba(255,255,255,.06);
      position: relative;
      box-shadow: inset 0 0 24px rgba(0,255,255,.08);
    }
    .knob {
      width: 56px;
      height: 56px;
      border-radius: 999px;
      background: rgba(120,255,255,.38);
      border: 1px solid rgba(255,255,255,.35);
      position: absolute;
      left: 42px;
      top: 42px;
      box-shadow: 0 0 20px rgba(0,255,255,.42);
    }
    .shootBtn {
      width: 98px;
      height: 98px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 1000;
      color: white;
      background: radial-gradient(circle, rgba(255,70,160,.45), rgba(120,0,255,.25));
      border: 1px solid rgba(255,255,255,.25);
      box-shadow: 0 0 26px rgba(255,0,180,.35);
    }
    @media (hover: none), (pointer: coarse) {
      .mobile-controls { display: flex; }
      #message { bottom: calc(170px + env(safe-area-inset-bottom)); }
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="topbar">
      <div class="panel stats">
        <div>HP <span id="hpText">100</span></div>
        <div class="bar-wrap"><div id="hpBar" class="bar"></div></div>
      </div>
      <div class="panel stats" style="text-align:right">
        <div>SCORE <span id="scoreText">0</span></div>
        <div>WAVE <span id="waveText">1</span></div>
        <div>KILLS <span id="killText">0</span></div>
      </div>
    </div>
    <div id="crosshair"></div>
    <div id="message">點擊畫面鎖定滑鼠。WASD 移動，滑鼠瞄準，左鍵發射激光。</div>
  </div>

  <div class="mobile-controls">
    <div id="stick" class="stick"><div id="knob" class="knob"></div></div>
    <div id="shootBtn" class="shootBtn">LASER</div>
  </div>

  <div id="overlay">
    <div class="menu">
      <h1>NEON<br>LASER FPS</h1>
      <div class="subtitle">
        第一人稱激光槍生存戰。<br>
        打爆霓虹無人機，撐過越來越兇的波次。
      </div>
      <button id="startBtn">開始遊戲</button>
      <div class="controls">
        <div class="key">WASD：移動</div>
        <div class="key">滑鼠：瞄準</div>
        <div class="key">左鍵：激光槍</div>
        <div class="key">R：重開</div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const hpText = document.getElementById('hpText');
    const hpBar = document.getElementById('hpBar');
    const scoreText = document.getElementById('scoreText');
    const waveText = document.getElementById('waveText');
    const killText = document.getElementById('killText');
    const message = document.getElementById('message');
    const stick = document.getElementById('stick');
    const knob = document.getElementById('knob');
    const shootBtn = document.getElementById('shootBtn');

    const TAU = Math.PI * 2;
    const FOV = Math.PI / 3.1;
    const MAP_SIZE = 24;
    const CELL = 1;
    const MAX_DEPTH = 22;

    let W = 0;
    let H = 0;
    let running = false;
    let gameOver = false;
    let last = performance.now();
    let shake = 0;
    let flash = 0;
    let laserTrail = [];
    let particles = [];
    let enemies = [];
    let pickups = [];

    const player = {
      x: 12,
      y: 12,
      angle: -Math.PI / 2,
      hp: 100,
      score: 0,
      kills: 0,
      wave: 1,
      fireCooldown: 0,
      invuln: 0,
    };

    const keys = new Set();
    const mobile = { x: 0, y: 0, active: false, firing: false, lookId: null, lastX: 0, lastY: 0, lookSensitivity: 0.0052 };
    const isTouchDevice = matchMedia('(hover: none), (pointer: coarse)').matches;

    const map = [];
    function generateMap() {
      map.length = 0;
      for (let y = 0; y < MAP_SIZE; y++) {
        let row = '';
        for (let x = 0; x < MAP_SIZE; x++) {
          const border = x === 0 || y === 0 || x === MAP_SIZE - 1 || y === MAP_SIZE - 1;
          const pillar = (x % 5 === 0 && y % 5 === 0 && !(x > 9 && x < 15 && y > 9 && y < 15));
          const wall = border || pillar || (Math.random() < 0.055 && Math.hypot(x - 12, y - 12) > 5);
          row += wall ? '#' : '.';
        }
        map.push(row);
      }
    }

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = Math.floor(innerWidth * dpr);
      H = Math.floor(innerHeight * dpr);
      canvas.width = W;
      canvas.height = H;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      W = innerWidth;
      H = innerHeight;
    }
    addEventListener('resize', resize);
    resize();

    function isWall(x, y) {
      const mx = Math.floor(x);
      const my = Math.floor(y);
      if (mx < 0 || my < 0 || mx >= MAP_SIZE || my >= MAP_SIZE) return true;
      return map[my][mx] === '#';
    }

    function resetGame() {
      generateMap();
      player.x = 12;
      player.y = 12;
      player.angle = -Math.PI / 2;
      player.hp = 100;
      player.score = 0;
      player.kills = 0;
      player.wave = 1;
      player.fireCooldown = 0;
      player.invuln = 0;
      enemies = [];
      pickups = [];
      particles = [];
      laserTrail = [];
      shake = 0;
      flash = 0;
      gameOver = false;
      spawnWave();
      updateHud();
    }

    function spawnWave() {
      const count = 4 + player.wave * 2;
      for (let i = 0; i < count; i++) {
        let x, y;
        let attempts = 0;
        do {
          x = 1.5 + Math.random() * (MAP_SIZE - 3);
          y = 1.5 + Math.random() * (MAP_SIZE - 3);
          attempts++;
        } while ((isWall(x, y) || Math.hypot(x - player.x, y - player.y) < 7) && attempts < 200);

        enemies.push({
          x, y,
          hp: 32 + player.wave * 7,
          maxHp: 32 + player.wave * 7,
          speed: 0.85 + player.wave * 0.035 + Math.random() * 0.25,
          radius: 0.34,
          hit: 0,
          attackCooldown: Math.random() * 1.2,
          bob: Math.random() * TAU,
        });
      }
      message.textContent = `第 ${player.wave} 波來了，敵人數量：${count}`;
    }

    function castRay(angle) {
      const sin = Math.sin(angle);
      const cos = Math.cos(angle);
      let depth = 0;
      let hitX = player.x;
      let hitY = player.y;
      let side = 0;
      const step = 0.025;
      while (depth < MAX_DEPTH) {
        hitX = player.x + cos * depth;
        hitY = player.y + sin * depth;
        if (isWall(hitX, hitY)) {
          const fx = hitX - Math.floor(hitX);
          const fy = hitY - Math.floor(hitY);
          side = Math.min(fx, 1 - fx) < Math.min(fy, 1 - fy) ? 1 : 0;
          break;
        }
        depth += step;
      }
      return { depth, hitX, hitY, side };
    }

    function lineOfSight(x1, y1, x2, y2) {
      const dist = Math.hypot(x2 - x1, y2 - y1);
      const steps = Math.ceil(dist / 0.08);
      for (let i = 1; i < steps; i++) {
        const t = i / steps;
        const x = x1 + (x2 - x1) * t;
        const y = y1 + (y2 - y1) * t;
        if (isWall(x, y)) return false;
      }
      return true;
    }

    function shoot() {
      if (!running || gameOver || player.fireCooldown > 0) return;
      player.fireCooldown = 0.14;
      flash = 0.11;
      shake = Math.max(shake, 5);

      const ray = castRay(player.angle);
      let best = null;
      let bestDist = ray.depth;
      const aimWidth = 0.07;

      for (const e of enemies) {
        const dx = e.x - player.x;
        const dy = e.y - player.y;
        const dist = Math.hypot(dx, dy);
        if (dist > bestDist) continue;
        let da = Math.atan2(dy, dx) - player.angle;
        da = Math.atan2(Math.sin(da), Math.cos(da));
        const angularSize = Math.atan2(e.radius * 1.35, dist);
        if (Math.abs(da) < angularSize + aimWidth && lineOfSight(player.x, player.y, e.x, e.y)) {
          best = e;
          bestDist = dist;
        }
      }

      const endX = player.x + Math.cos(player.angle) * bestDist;
      const endY = player.y + Math.sin(player.angle) * bestDist;
      laserTrail.push({ x1: player.x, y1: player.y, x2: endX, y2: endY, life: 0.09, max: 0.09 });

      if (best) {
        best.hp -= 34;
        best.hit = 0.13;
        player.score += 8;
        burst(best.x, best.y, 14, 'hit');
        if (best.hp <= 0) {
          player.score += 80 + player.wave * 5;
          player.kills++;
          burst(best.x, best.y, 34, 'kill');
          if (Math.random() < 0.18) pickups.push({ x: best.x, y: best.y, type: 'hp', life: 14 });
        }
      }
    }

    function burst(x, y, count, type) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * TAU;
        const s = 0.7 + Math.random() * 2.8;
        particles.push({
          x, y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: 0.35 + Math.random() * 0.45,
          max: 0.8,
          size: type === 'kill' ? 4 + Math.random() * 6 : 2 + Math.random() * 4,
          type,
        });
      }
    }

    function tryMove(obj, dx, dy) {
      const r = 0.22;
      if (!isWall(obj.x + dx + Math.sign(dx) * r, obj.y)) obj.x += dx;
      if (!isWall(obj.x, obj.y + dy + Math.sign(dy) * r)) obj.y += dy;
    }

    function update(dt) {
      if (!running || gameOver) return;

      player.fireCooldown = Math.max(0, player.fireCooldown - dt);
      player.invuln = Math.max(0, player.invuln - dt);
      shake = Math.max(0, shake - dt * 20);
      flash = Math.max(0, flash - dt);

      if (mobile.firing) shoot();

      let forward = 0;
      let strafe = 0;
      if (keys.has('w')) forward += 1;
      if (keys.has('s')) forward -= 1;
      if (keys.has('a')) strafe -= 1;
      if (keys.has('d')) strafe += 1;
      forward += -mobile.y;
      strafe += mobile.x;

      const len = Math.hypot(forward, strafe) || 1;
      forward /= len;
      strafe /= len;
      const speed = keys.has('shift') ? 4.1 : 3.1;
      const ca = Math.cos(player.angle);
      const sa = Math.sin(player.angle);
      const dx = (ca * forward + Math.cos(player.angle + Math.PI / 2) * strafe) * speed * dt;
      const dy = (sa * forward + Math.sin(player.angle + Math.PI / 2) * strafe) * speed * dt;
      tryMove(player, dx, dy);

      for (const e of enemies) {
        e.bob += dt * 6;
        e.hit = Math.max(0, e.hit - dt);
        e.attackCooldown = Math.max(0, e.attackCooldown - dt);
        const dxp = player.x - e.x;
        const dyp = player.y - e.y;
        const dist = Math.hypot(dxp, dyp);
        if (dist > 0.55 && lineOfSight(e.x, e.y, player.x, player.y)) {
          const vx = dxp / dist * e.speed * dt;
          const vy = dyp / dist * e.speed * dt;
          tryMove(e, vx, vy);
        }
        if (dist < 0.85 && e.attackCooldown <= 0) {
          e.attackCooldown = 0.75;
          if (player.invuln <= 0) {
            player.hp -= 9 + Math.floor(player.wave * 0.7);
            player.invuln = 0.22;
            shake = Math.max(shake, 10);
            message.textContent = '被敵人撞到了！拉開距離！';
            if (player.hp <= 0) {
              player.hp = 0;
              endGame();
            }
          }
        }
      }

      enemies = enemies.filter(e => e.hp > 0);

      for (const p of pickups) {
        p.life -= dt;
        if (Math.hypot(p.x - player.x, p.y - player.y) < 0.6) {
          player.hp = Math.min(100, player.hp + 22);
          p.life = 0;
          player.score += 25;
          message.textContent = '補血 +22';
        }
      }
      pickups = pickups.filter(p => p.life > 0);

      for (const p of particles) {
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.92;
        p.vy *= 0.92;
      }
      particles = particles.filter(p => p.life > 0);

      for (const l of laserTrail) l.life -= dt;
      laserTrail = laserTrail.filter(l => l.life > 0);

      if (enemies.length === 0) {
        player.wave++;
        player.hp = Math.min(100, player.hp + 12);
        spawnWave();
      }

      updateHud();
    }

    function endGame() {
      gameOver = true;
      overlay.style.display = 'grid';
      startBtn.textContent = '重新開始';
      document.querySelector('.subtitle').innerHTML = `你被無人機包圍了。<br>最終分數：${player.score}｜擊殺：${player.kills}｜波次：${player.wave}`;
      if (document.pointerLockElement) document.exitPointerLock();
    }

    function updateHud() {
      hpText.textContent = Math.ceil(player.hp);
      hpBar.style.width = `${player.hp}%`;
      scoreText.textContent = player.score;
      waveText.textContent = player.wave;
      killText.textContent = player.kills;
    }

    function project(wx, wy, size = 1) {
      const dx = wx - player.x;
      const dy = wy - player.y;
      const dist = Math.hypot(dx, dy);
      let angle = Math.atan2(dy, dx) - player.angle;
      angle = Math.atan2(Math.sin(angle), Math.cos(angle));
      if (Math.abs(angle) > FOV * 0.72 || dist < 0.05) return null;
      const x = W / 2 + Math.tan(angle) / Math.tan(FOV / 2) * W / 2;
      const scale = Math.min(900, H / (dist * Math.cos(angle)));
      const h = scale * size;
      const y = H / 2 - h * 0.5;
      return { x, y, h, dist, angle };
    }

    function draw() {
      const sx = (Math.random() - 0.5) * shake;
      const sy = (Math.random() - 0.5) * shake;
      ctx.save();
      ctx.translate(sx, sy);

      drawSkyFloor();
      drawWalls();
      drawWorldObjects();
      drawLaser();
      drawGun();
      drawVignette();
      ctx.restore();

      if (flash > 0) {
        ctx.save();
        ctx.globalAlpha = flash * 3;
        ctx.fillStyle = 'rgba(120,255,255,.18)';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
      requestAnimationFrame(loop);
    }

    function drawSkyFloor() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#07112d');
      grad.addColorStop(0.5, '#080914');
      grad.addColorStop(1, '#03040a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = 'rgba(0,255,255,.08)';
      for (let i = 0; i < 28; i++) {
        const y = H / 2 + i * i * 0.9;
        ctx.fillRect(0, y, W, 1);
      }
      ctx.strokeStyle = 'rgba(0,255,255,.06)';
      ctx.lineWidth = 1;
      for (let i = -20; i <= 20; i++) {
        const x = W / 2 + i * 70;
        ctx.beginPath();
        ctx.moveTo(W / 2, H / 2);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
    }

    function drawWalls() {
      const rays = Math.floor(W / 3);
      const strip = W / rays + 1;
      for (let i = 0; i < rays; i++) {
        const t = i / rays;
        const angle = player.angle - FOV / 2 + t * FOV;
        const ray = castRay(angle);
        const corrected = ray.depth * Math.cos(angle - player.angle);
        const wallH = Math.min(H * 2, H / Math.max(corrected, 0.001));
        const x = i * strip;
        const y = H / 2 - wallH / 2;
        const shade = Math.max(0, 1 - corrected / MAX_DEPTH);
        const glow = ray.side ? 1 : 0.72;
        ctx.fillStyle = `rgba(${20 + shade * 40}, ${120 + shade * 120}, ${160 + shade * 95}, ${0.42 + shade * 0.55})`;
        ctx.fillRect(x, y, strip, wallH);
        ctx.fillStyle = `rgba(0, 255, 255, ${shade * glow * 0.18})`;
        ctx.fillRect(x, y, strip, 2);
        ctx.fillRect(x, y + wallH - 2, strip, 2);
        if (i % 9 === 0) {
          ctx.fillStyle = `rgba(255,0,255,${shade * 0.12})`;
          ctx.fillRect(x, y, 1, wallH);
        }
      }
    }

    function drawWorldObjects() {
      const renderables = [];
      for (const e of enemies) {
        if (!lineOfSight(player.x, player.y, e.x, e.y)) continue;
        const p = project(e.x, e.y, 0.82);
        if (p) renderables.push({ kind: 'enemy', ref: e, ...p });
      }
      for (const pck of pickups) {
        if (!lineOfSight(player.x, player.y, pck.x, pck.y)) continue;
        const p = project(pck.x, pck.y, 0.32);
        if (p) renderables.push({ kind: 'pickup', ref: pck, ...p });
      }
      for (const pt of particles) {
        const p = project(pt.x, pt.y, 0.09);
        if (p) renderables.push({ kind: 'particle', ref: pt, ...p });
      }
      renderables.sort((a, b) => b.dist - a.dist);

      for (const item of renderables) {
        if (item.kind === 'enemy') drawEnemy(item);
        if (item.kind === 'pickup') drawPickup(item);
        if (item.kind === 'particle') drawParticle(item);
      }
    }

    function drawEnemy(item) {
      const e = item.ref;
      const x = item.x;
      const y = item.y + Math.sin(e.bob) * 8;
      const h = item.h;
      const w = h * 0.72;
      const hit = e.hit > 0;

      ctx.save();
      ctx.shadowBlur = hit ? 32 : 18;
      ctx.shadowColor = hit ? '#ffffff' : '#ff2bd6';
      const body = ctx.createRadialGradient(x, y + h * 0.35, h * 0.05, x, y + h * 0.35, h * 0.52);
      body.addColorStop(0, hit ? '#ffffff' : '#ff83f7');
      body.addColorStop(0.45, '#9d30ff');
      body.addColorStop(1, '#27004f');
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.ellipse(x, y + h * 0.45, w * 0.48, h * 0.48, 0, 0, TAU);
      ctx.fill();

      ctx.shadowBlur = 16;
      ctx.shadowColor = '#00fff0';
      ctx.fillStyle = '#95fff9';
      ctx.beginPath();
      ctx.arc(x - w * 0.16, y + h * 0.36, Math.max(2, h * 0.055), 0, TAU);
      ctx.arc(x + w * 0.16, y + h * 0.36, Math.max(2, h * 0.055), 0, TAU);
      ctx.fill();

      const hpw = w * 0.65;
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(0,0,0,.35)';
      ctx.fillRect(x - hpw / 2, y - h * 0.08, hpw, 4);
      ctx.fillStyle = '#66fff8';
      ctx.fillRect(x - hpw / 2, y - h * 0.08, hpw * Math.max(0, e.hp / e.maxHp), 4);
      ctx.restore();
    }

    function drawPickup(item) {
      const x = item.x;
      const y = item.y;
      const s = item.h;
      ctx.save();
      ctx.shadowBlur = 24;
      ctx.shadowColor = '#9cff00';
      ctx.fillStyle = 'rgba(156,255,0,.82)';
      ctx.beginPath();
      ctx.roundRect(x - s * 0.35, y + s * 0.15, s * 0.7, s * 0.7, 8);
      ctx.fill();
      ctx.fillStyle = '#001015';
      ctx.fillRect(x - s * 0.05, y + s * 0.25, s * 0.1, s * 0.5);
      ctx.fillRect(x - s * 0.25, y + s * 0.45, s * 0.5, s * 0.1);
      ctx.restore();
    }

    function drawParticle(item) {
      const p = item.ref;
      const a = Math.max(0, p.life / p.max);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.shadowBlur = 15;
      ctx.shadowColor = p.type === 'kill' ? '#ff2bd6' : '#00fff0';
      ctx.fillStyle = p.type === 'kill' ? '#ff73e8' : '#7ffff8';
      ctx.beginPath();
      ctx.arc(item.x, item.y + item.h * 0.4, Math.max(1, item.h * p.size * 0.05), 0, TAU);
      ctx.fill();
      ctx.restore();
    }

    function drawLaser() {
      for (const l of laserTrail) {
        const a = l.life / l.max;
        const p1 = project(l.x1 + Math.cos(player.angle) * 0.8, l.y1 + Math.sin(player.angle) * 0.8, 0.05);
        const p2 = project(l.x2, l.y2, 0.05);
        if (!p1 || !p2) continue;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.strokeStyle = '#8fffff';
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#00fff0';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(W / 2, H * 0.57);
        ctx.lineTo(p2.x, p2.y + p2.h * 0.5);
        ctx.stroke();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawGun() {
      const recoil = player.fireCooldown > 0 ? player.fireCooldown * 120 : 0;
      const cx = W / 2;
      const baseY = H - 20 + recoil;
      ctx.save();
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#00fff0';
      const g = ctx.createLinearGradient(cx - 160, baseY - 170, cx + 160, baseY);
      g.addColorStop(0, 'rgba(40,255,255,.95)');
      g.addColorStop(0.45, 'rgba(30,60,110,.96)');
      g.addColorStop(1, 'rgba(255,70,220,.86)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(cx - 120, baseY);
      ctx.lineTo(cx - 52, baseY - 130);
      ctx.lineTo(cx + 52, baseY - 130);
      ctx.lineTo(cx + 132, baseY);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,.82)';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.roundRect(cx - 22, baseY - 158, 44, 70, 14);
      ctx.fill();

      if (flash > 0) {
        ctx.globalAlpha = Math.min(1, flash * 10);
        ctx.shadowBlur = 50;
        ctx.shadowColor = '#ffffff';
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(cx, baseY - 172, 28 + Math.random() * 18, 0, TAU);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawVignette() {
      const v = ctx.createRadialGradient(W / 2, H / 2, H * 0.2, W / 2, H / 2, H * 0.78);
      v.addColorStop(0, 'rgba(0,0,0,0)');
      v.addColorStop(1, player.invuln > 0 ? 'rgba(255,0,80,.34)' : 'rgba(0,0,0,.55)');
      ctx.fillStyle = v;
      ctx.fillRect(0, 0, W, H);
    }

    function loop(now = performance.now()) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt);
      draw();
    }

    startBtn.addEventListener('click', async () => {
      resetGame();
      running = true;
      overlay.style.display = 'none';
      last = performance.now();

      try {
        if (isTouchDevice && document.fullscreenEnabled && !document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        }
      } catch (err) {
        // 手機瀏覽器可能阻擋全螢幕，不影響遊戲開始
      }

      if (!isTouchDevice) canvas.requestPointerLock?.();
      message.textContent = isTouchDevice
        ? '左下搖桿移動，右半邊滑動瞄準，右下 LASER 射擊。'
        : 'WASD 移動，滑鼠瞄準，左鍵激光。R 可以重開。';
    });

    canvas.addEventListener('click', () => {
      if (!running || gameOver || isTouchDevice) return;
      canvas.requestPointerLock?.();
    });

    addEventListener('keydown', e => {
      keys.add(e.key.toLowerCase());
      if (e.key.toLowerCase() === 'r') {
        resetGame();
        running = true;
        overlay.style.display = 'none';
      }
    });
    addEventListener('keyup', e => keys.delete(e.key.toLowerCase()));

    addEventListener('mousemove', e => {
      if (document.pointerLockElement === canvas && running && !gameOver) {
        player.angle += e.movementX * 0.0022;
      }
    });
    addEventListener('mousedown', e => {
      if (isTouchDevice) return;
      if (e.button === 0) shoot();
    });

    // Mobile virtual joystick + right-side touch look
    stick.addEventListener('pointerdown', e => {
      mobile.active = true;
      stick.setPointerCapture(e.pointerId);
      moveStick(e);
    });
    stick.addEventListener('pointermove', moveStick);
    stick.addEventListener('pointerup', e => {
      mobile.active = false;
      mobile.x = 0;
      mobile.y = 0;
      knob.style.left = '42px';
      knob.style.top = '42px';
    });
    function moveStick(e) {
      if (!mobile.active) return;
      const rect = stick.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      let dx = e.clientX - cx;
      let dy = e.clientY - cy;
      const max = 44;
      const len = Math.hypot(dx, dy);
      if (len > max) {
        dx = dx / len * max;
        dy = dy / len * max;
      }
      mobile.x = dx / max;
      mobile.y = dy / max;
      knob.style.left = `${42 + dx}px`;
      knob.style.top = `${42 + dy}px`;
    }
    shootBtn.addEventListener('pointerdown', e => {
      e.preventDefault();
      e.stopPropagation();
      mobile.firing = true;
      shootBtn.setPointerCapture(e.pointerId);
      shoot();
    });
    shootBtn.addEventListener('pointerup', e => {
      e.preventDefault();
      mobile.firing = false;
    });
    shootBtn.addEventListener('pointercancel', () => mobile.firing = false);
    shootBtn.addEventListener('pointerleave', () => mobile.firing = false);

    function insideElement(el, x, y) {
      const r = el.getBoundingClientRect();
      return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
    }

    addEventListener('touchstart', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        const onShoot = insideElement(shootBtn, t.clientX, t.clientY);
        const onStick = insideElement(stick, t.clientX, t.clientY);
        if (t.clientX > innerWidth * 0.35 && !onShoot && !onStick && mobile.lookId === null) {
          mobile.lookId = t.identifier;
          mobile.lastX = t.clientX;
          mobile.lastY = t.clientY;
        }
      }
    }, { passive: false });
    addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === mobile.lookId) {
          const dx = t.clientX - mobile.lastX;
          mobile.lastX = t.clientX;
          mobile.lastY = t.clientY;
          player.angle += dx * mobile.lookSensitivity;
        }
      }
    }, { passive: false });
    addEventListener('touchend', e => {
      for (const t of e.changedTouches) {
        if (t.identifier === mobile.lookId) mobile.lookId = null;
      }
    }, { passive: true });
    addEventListener('touchcancel', e => {
      for (const t of e.changedTouches) {
        if (t.identifier === mobile.lookId) mobile.lookId = null;
      }
    }, { passive: true });

    let lastTouchEnd = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTouchEnd <= 320) e.preventDefault();
      lastTouchEnd = now;
    }, { passive: false });

    generateMap();
    spawnWave();
    updateHud();
    loop();
  </script>
</body>
</html>
